<html lang="en">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>

        .serif { font-family: 'DM Serif Display', serif; }

        }
        h1.intro-title {

        }
        .intro-sub {
            font-size: 17px;
            color: #5C5F66;

        }
        .dim-grid {
            display: grid;

        .dim-card {
            background: #fff;

        }
        .dim-card-icon {

        .info-box {

        .btn-primary {

        }
        .btn-primary:hover { background: #369e9a; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .small-text {
            text-align: center;
            font-size: 13px;
            color: #9a9aaf;
            margin-top: 14px;
        }
        /* Contact Form */
        .form-heading {
            font-family: 'DM Serif Display', serif;
            color: #2E2B6F;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 400;
        }
        .form-sub {
            color: #5C5F66;
            font-size: 15px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2E2B6F;
            margin-bottom: 6px;
        }
        .form-group input {

        /* Assessment */
        .progress-bar-wrap {

        .progress-seg {

        .radio-dot {

        }
        .btn-back {

            border: 1.5px solid #d0d0da;

            border-radius: 10px;
            font-size: 15px;

            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s;
        }
        .btn-back:hover { border-color: #aaa; }
        .btn-next {
            padding: 14px 28px;
            background: #3FA7A3;
            color: #fff;
            border: none;
            border-radius: 10px;

            font-family: 'DM Sans', sans-serif;

        /* Results */
        .score-hero {

            padding: 40px 32px;

            margin-bottom: 28px;

            overflow: hidden;
        }
        .score-ring-wrap { margin-bottom: 16px; }
        .score-ring-wrap svg { filter: drop-shadow(0 4px 20px rgba(0,0,0,0.15)); }
        .score-level {

        }
        .score-desc {

        }
        .greeting {

            color: #2E2B6F;

            margin-bottom: 24px;
            line-height: 1.5;
        }
        .dim-result-card {
            background: #fff;

            padding: 20px;

        }
        .dim-result-header {

        .level-pill {

        .progress-track {

        .progress-fill {

        .dim-score-text {

        .gaps-section { margin-top: 32px; margin-bottom: 32px; }
        .gaps-title {

        .gap-item {

        .next-steps-title {

        }
        .step-item {
            display: flex;

            margin-bottom: 14px;
        }
        .step-num {
            width: 32px;
            height: 32px;
            min-width: 32px;
            background: #2E2B6F;
            color: #fff;
            border-radius: 50%;

            justify-content: center;
            font-size: 14px;
            font-weight: 700;

        .btn-download {
            display: block;

            padding: 16px;
            background: #2E2B6F;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;

        }

        .cta-block {
            background: linear-gradient(135deg, #2E2B6F, #3d3a7f);

        .cta-block h3 {

        }
        .cta-block a {
            display: inline-block;
            padding: 14px 32px;
            background: #3FA7A3;

            border-radius: 10px;

        .footer-attr {

            color: #9a9aaf;
            padding: 24px 0;
            border-top: 1px solid #e8e8ec;
            line-height: 1.7;
        }
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        .anim-fade { animation: fadeIn 0.5s ease forwards; }
        .anim-slide { animation: fadeSlideIn 0.5s ease forwards; opacity: 0; }
        .anim-scale { animation: scaleIn 0.6s ease forwards; opacity: 0; }
        .anim-delay-1 { animation-delay: 0.08s; }
        .anim-delay-2 { animation-delay: 0.16s; }
        .anim-delay-3 { animation-delay: 0.24s; }

        .anim-delay-5 { animation-delay: 0.4s; }
        .anim-delay-6 { animation-delay: 0.48s; }
        @media (max-width: 600px) {
            .dim-grid { grid-template-columns: 1fr; }
            h1.intro-title { font-size: 28px; }
            .score-hero { padding: 28px 20px; }
            .score-level { font-size: 26px; }
            .main-wrap { padding: 24px 16px 48px; }
            .header { padding: 14px 16px; }
            .logo-text { font-size: 12px; letter-spacing: 1.5px; }

<body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzOeLDsRgCtWiYZFG1HGYxdpG2I0AFnBT4A5nYSECOdcfAzLwRb4HRBgoBtHOT0XMBc/exec";

        const DIMENSIONS = [
            { title: "Leadership & Vision", icon: "\u2666", subtitle: "Strategic direction and commitment" },
            { title: "Policy & Governance", icon: "\u25C7", subtitle: "Guardrails and accountability" },
            { title: "Staff Capacity & Culture", icon: "\u25CB", subtitle: "People and professional growth" },
            { title: "Infrastructure & Data Systems", icon: "\u25A1", subtitle: "Technology and data readiness" }
        ];

        const QUESTIONS = [
            [
                {
                    text: "Does your organization have a clearly articulated vision for how AI supports your educational mission?",
                    options: ["No vision exists", "Informal discussions have occurred", "A draft vision is in progress", "A formal vision is documented and communicated"]
                },
                {
                    text: "Is there a designated leader or cross-functional team responsible for AI strategy?",
                    options: ["No one is assigned", "One person is informally exploring AI", "A small team is formed but not formalized", "A cross-functional AI leadership team with clear roles exists"]
                },
                {
                    text: "How engaged is your board and senior leadership in understanding AI\u2019s role in education?",
                    options: ["Not engaged at all", "Aware AI exists but not actively learning", "Received one or more briefings on AI", "Actively participating in AI strategy and policy decisions"]
                },
                {
                    text: "Does your organization have metrics or goals to evaluate the impact of AI initiatives?",
                    options: ["No metrics exist", "We plan to develop metrics eventually", "Some informal tracking is happening", "Formal KPIs are defined and regularly reviewed"]
                }
            ],
            [
                {
                    text: "Does your organization have a formal Acceptable/Responsible Use Policy that addresses AI tools?",
                    options: ["No AI-specific policy exists", "General tech policy exists but does not address AI", "AI has been added to existing policies informally", "A comprehensive AI use policy is published and enforced"]
                },
                {
                    text: "How does your organization address data privacy and FERPA compliance when evaluating AI tools?",
                    options: ["No formal process for vetting AI tools", "We rely on vendor assurances without independent review", "A basic vetting process exists for some tools", "A formal procurement and privacy review process covers all AI tools"]
                },
                {
                    text: "Does your organization have guidelines addressing AI-generated content, attribution, and academic integrity?",
                    options: ["No guidelines exist", "Teachers handle this individually", "Some building-level guidelines exist", "District-wide guidelines are documented and communicated to all stakeholders"]
                },
                {
                    text: "Has your organization addressed equity and bias considerations in AI tool selection and use?",
                    options: ["Not considered", "Awareness exists but no formal process", "Equity is part of informal evaluation discussions", "Formal equity criteria are built into AI procurement and evaluation"]
                }
            ],
            [
                {
                    text: "What level of AI-related professional development has your organization provided to educators?",
                    options: ["None", "A single awareness session or optional webinar", "Multiple sessions offered but not required", "Ongoing, role-specific AI PD is embedded in the organizational plan"]
                },
                {
                    text: "How would you describe the general attitude of your staff toward AI adoption?",
                    options: ["Mostly resistant or fearful", "Cautiously skeptical", "Curious but unsure how to start", "Actively experimenting and eager to learn more"]
                },
                {
                    text: "Do educators have access to approved AI tools and resources for instructional use?",
                    options: ["No approved AI tools are available", "Teachers are using personal accounts on their own", "A few approved tools exist but access is inconsistent", "A vetted set of AI tools is available with training and support"]
                },
                {
                    text: "Are there peer networks, coaches, or communities of practice for AI integration in your organization?",
                    options: ["None", "Informal conversations happen occasionally", "A pilot group or early adopters share informally", "Formal communities of practice with dedicated coaching support exist"]
                }
            ],
            [
                {
                    text: "Does your organization have the technical infrastructure (devices, bandwidth, SSO) to support AI tool deployment?",
                    options: ["Significant gaps in devices and/or connectivity", "Basic infrastructure exists but not optimized for AI", "Infrastructure supports some AI tools with minor limitations", "Robust infrastructure with SSO, adequate bandwidth, and sufficient devices"]
                },
                {
                    text: "Does your organization have a cybersecurity framework that includes AI-specific considerations?",
                    options: ["No cybersecurity framework exists", "General cybersecurity exists but does not address AI", "AI considerations are being added to existing frameworks", "Cybersecurity framework explicitly addresses AI tools, data flows, and risks"]
                },
                {
                    text: "How would you describe your organization\u2019s data governance and data quality practices?",
                    options: ["No formal data governance", "Basic policies exist but are inconsistently followed", "Data governance is in place with assigned stewards", "Comprehensive data governance with classification, quality audits, and clear ownership"]
                },
                {
                    text: "Does your organization track and monitor which AI tools are being used across the organization?",
                    options: ["No tracking or visibility", "We know some tools are used but have no formal tracking", "A partial inventory exists", "A comprehensive AI tool inventory is maintained and regularly updated"]
                }
            ]
        ];

        const LEVELS = {
            exploring: {
                name: "Exploring",
                color: "#E8634A",
                range: [16, 24],
                dimRange: [4, 6],
                description: "Your organization is in the early stages of understanding AI\u2019s potential. This is a common starting point, and it means there is significant opportunity to build a strong foundation from the ground up.",
                steps: [
                    "Convene a small AI exploration committee with representatives from leadership, instruction, and IT.",
                    "Schedule an AI awareness session for your board and senior leadership team.",
                    "Conduct an inventory of any AI tools already being used informally across the organization.",
                    "Review your existing acceptable use and data privacy policies for AI-related gaps."
                ]
            },
            developing: {
                name: "Developing",
                color: "#E8A94A",
                range: [25, 40],
                dimRange: [7, 10],
                description: "Your organization has started the journey but lacks the formal structures needed to scale. Key gaps in policy, training, or infrastructure are likely limiting progress.",
                steps: [
                    "Draft a formal AI vision statement aligned to your strategic plan and educational mission.",
                    "Develop an AI-specific acceptable use policy with input from legal, instructional, and technical stakeholders.",
                    "Launch a structured professional development series that goes beyond awareness to hands-on integration.",
                    "Establish a formal AI tool vetting and procurement process that includes privacy and equity criteria."
                ]
            },
            implementing: {
                name: "Implementing",
                color: "#3FA7A3",
                range: [41, 52],
                dimRange: [11, 13],
                description: "Your organization has solid foundations and is actively putting AI strategies into practice. Focus now on deepening integration, building consistency, and measuring impact.",
                steps: [
                    "Define and begin tracking KPIs for AI initiative effectiveness and student impact.",
                    "Create formal communities of practice with dedicated coaching support for educators.",
                    "Expand your cybersecurity framework to explicitly address AI-specific data flows and risks.",
                    "Develop a comprehensive AI tool inventory with regular review cycles."
                ]
            },
            leading: {
                name: "Leading",
                color: "#2E2B6F",
                range: [53, 64],
                dimRange: [14, 16],
                description: "Your organization is among the most advanced in AI readiness. You have strong leadership, comprehensive policies, a skilled workforce, and robust infrastructure. Now focus on continuous improvement and sharing your learnings.",
                steps: [
                    "Publish and share your AI framework as a model for peer organizations and networks.",
                    "Implement advanced analytics to measure AI\u2019s direct impact on student outcomes and equity.",
                    "Establish partnerships with research institutions to stay at the frontier of AI in education.",
                    "Create a mentorship program to help neighboring districts accelerate their AI readiness."
                ]
            }
        };

        function getLevel(score, isDim) {
            if (isDim) {
                if (score <= 6) return LEVELS.exploring;
                if (score <= 10) return LEVELS.developing;
                if (score <= 13) return LEVELS.implementing;
                return LEVELS.leading;
            }
            if (score <= 24) return LEVELS.exploring;
            if (score <= 40) return LEVELS.developing;
            if (score <= 52) return LEVELS.implementing;
            return LEVELS.leading;
        }

        function ScoreRing({ score, max, color }) {
            const r = 70, c = 2 * Math.PI * r;
            const pct = score / max;
            const offset = c * (1 - pct);
            return (
                <svg width="170" height="170" viewBox="0 0 170 170">
                    <circle cx="85" cy="85" r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="12" />
                    <circle cx="85" cy="85" r={r} fill="none" stroke="#fff" strokeWidth="12"
                        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
                        transform="rotate(-90 85 85)" style={{ transition: 'stroke-dashoffset 1.2s ease' }} />
                    <text x="85" y="78" textAnchor="middle" fill="#fff" fontSize="38" fontWeight="700" fontFamily="DM Sans">{score}</text>
                    <text x="85" y="102" textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize="14" fontFamily="DM Sans">out of {max}</text>
                </svg>
            );
        }

        function Header({ phase, step }) {

        function IntroScreen({ onStart }) {
            return (

                    <p className="small-text">Takes about 5 minutes. Your information stays private.</p>

        function ContactForm({ contact, setContact, onBegin }) {

                        <label>Email Address</label>
                        <input type="email" placeholder="jane@springfield.k12.us" value={contact.email}

                </div>
            );

        function Assessment({ step, setStep, answers, setAnswers, onFinish }) {
            const questions = QUESTIONS[step];
            const dim = DIMENSIONS[step];
            const allAnswered = questions.every((_, qi) => answers[step][qi] !== null);

            function selectOption(qi, oi) {
                const next = answers.map((s, si) => si === step ? s.map((a, ai) => ai === qi ? oi + 1 : a) : s);
                setAnswers(next);
            }

            function handleNext() {
                if (step < 3) setStep(step + 1);
                else onFinish();
            }

            return (
                <div className="anim-fade" key={step}>
                    <div className="progress-bar-wrap">
                        {[0, 1, 2, 3].map(i => (
                            <div key={i} className={`progress-seg ${i < step ? 'done' : ''} ${i === step ? 'active' : ''}`} />

                    <div className="step-badge">Step {step + 1} of 4</div>
                    <h2 className="step-title">{dim.title}</h2>
                    <p className="step-subtitle">{dim.subtitle}</p>

                            {q.options.map((opt, oi) => (
                                <div key={oi}
                                    className={`option-card ${answers[step][qi] === oi + 1 ? 'selected' : ''}`}

                                    <div className="radio-circle"><div className="radio-dot" /></div>
                                    <span className="option-label">{opt}</span>
                                </div>
                            ))}
                        </div>
                    ))}
                    <div className="nav-row">
                        <button className="btn-back" onClick={() => step > 0 ? setStep(step - 1) : null}
                            style={{ visibility: step === 0 ? 'hidden' : 'visible' }}>Back</button>
                        <button className="btn-next" disabled={!allAnswered} onClick={handleNext}>
                            {step < 3 ? 'Next Step' : 'See My Results'}
                        </button>
                    </div>
                </div>
            );
        }

        function Results({ answers, contact }) {

        function App() {
            const [phase, setPhase] = useState('intro');
            const [contact, setContact] = useState({ name: '', email: '', org: '', role: '' });
            const [step, setStep] = useState(0);
            const [answers, setAnswers] = useState([[null,null,null,null],[null,null,null,null],[null,null,null,null],[null,null,null,null]]);
            const topRef = useRef(null);

            function scrollTop() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            useEffect(() => { scrollTop(); }, [phase, step]);

            function submitResults() {
                const flatAnswers = {};
                answers.forEach((stepAns, si) => {
                    stepAns.forEach((val, qi) => {
                        flatAnswers[`q${si + 1}_${qi + 1}`] = val;
                    });
                });
                const totalScore = answers.flat().reduce((a, b) => a + b, 0);
                const level = getLevel(totalScore, false);
                const payload = {
                    timestamp: new Date().toISOString(),
                    name: contact.name,
                    email: contact.email,
                    organization: contact.org,
                    role: contact.role,
                    ...flatAnswers,
                    totalScore,
                    level: level.name
                };

                fetch(WEBHOOK_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                }).catch(err => console.error("Webhook error:", err));
                setPhase('results');
            }

            return (
                <div ref={topRef}>
                    <Header phase={phase} step={step} />
                    <div className="main-wrap">
                        {phase === 'intro' && <IntroScreen onStart={() => setPhase('contact')} />}
                        {phase === 'contact' && <ContactForm contact={contact} setContact={setContact} onBegin={() => setPhase('assessment')} />}
                        {phase === 'assessment' && <Assessment step={step} setStep={setStep} answers={answers} setAnswers={setAnswers} onFinish={submitResults} />}
                        {phase === 'results' && <Results answers={answers} contact={contact} />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
