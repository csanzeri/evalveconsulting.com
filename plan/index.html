// ----- HELPERS ----------------------------------------------------------------

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function daysBetween(a, b) {
  const ms = startOfDay(b) - startOfDay(a);
  return Math.round(ms / (1000*60*60*24));
}
function fmtDate(d) {
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}
function isoWeekKey(d) {
  // Use plan-week index for storage keys.
  const day = daysBetween(PLAN_START, d);
  const wk = Math.max(0, Math.floor(day / 7));
  return `wk${wk+1}`;
}

function useLocalStorage(key, initial) {
  const [v, setV] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw == null) return initial;
      return JSON.parse(raw);
    } catch (e) { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {}
  }, [key, v]);
  return [v, setV];
}

function Card({ children, className = "" }) {
  return <div className={`bg-white border border-slate/10 rounded-2xl p-5 sm:p-6 shadow-sm ${className}`}>{children}</div>;
}

function WeekView({ week, today, completed, setCompleted }) {
  const todayIdx = useMemo(() => {
    const dow = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][(today.getDay() + 6) % 7];
    return week.days.findIndex(d => d.dow === dow);
  }, [week, today]);

  function toggle(id) {
    const set = new Set(completed);
    if (set.has(id)) set.delete(id); else set.add(id);
    setCompleted(Array.from(set));
  }

  return (
    <div className="space-y-4">
      <Card>
        <p className="text-[10px] uppercase tracking-widest text-teal font-bold">Week {week.n}</p>
        <h2 className="text-2xl mt-1">{week.title}</h2>

        <div className="mt-4 grid sm:grid-cols-2 gap-4">
          <div className="bg-paper rounded-xl p-4 border border-slate/10">
            <p className="text-[10px] uppercase tracking-widest text-slate font-bold">Success metric</p>
            <p className="font-head text-indigo text-xl mt-1">{week.metric.goal} {week.metric.label}</p>
            <p className="text-sm mt-1">{week.metric.note}</p>
          </div>
          <div className="bg-paper rounded-xl p-4 border border-slate/10">
            <p className="text-[10px] uppercase tracking-widest text-slate font-bold">Stop doing this week</p>
            <ul className="mt-1 space-y-1 text-sm">
              {week.stop.map((s, i) => <li key={i}>{s}</li>)}
            </ul>
          </div>
        </div>
      </Card>

      <div className="space-y-3">
        {week.days.map((d, i) => (
          <Card key={i} className={i === todayIdx ? "ring-2 ring-teal" : ""}>
            <div className="flex items-baseline justify-between gap-3">
              <h3 className="text-lg">
                {d.dow} <span className="text-slate font-body font-normal text-sm">· {d.date}</span>
              </h3>
              <p className="text-xs text-slate">{d.duration}</p>
            </div>
            <ul className="mt-3 space-y-2">
              {d.blocks.map(b => (
                <li key={b.id} className="flex gap-3 items-start">
                  <button onClick={() => toggle(b.id)}
                    className={`mt-0.5 w-5 h-5 rounded border-2 flex-shrink-0 transition-colors
                      ${completed.includes(b.id) ? "bg-teal border-teal" : "border-slate/40 hover:border-teal"}`}>
                    {completed.includes(b.id) && (
                      <svg viewBox="0 0 20 20" className="w-full h-full text-white"><path fill="currentColor" d="M7.5 13.5L4 10l1.4-1.4L7.5 10.7l7.1-7.1L16 5z"/></svg>
                    )}
                  </button>
                  <p className={`text-sm leading-relaxed ${completed.includes(b.id) ? "strike-done" : ""}`}>
                    <span className="text-teal font-semibold mr-1">{b.t}.</span>{b.text}
                  </p>
                </li>
              ))}
            </ul>
          </Card>
        ))}
      </div>
    </div>
  );
}

// ----- APP --------------------------------------------------------------------

function App() {
  const today = useMemo(() => startOfDay(new Date()), []);
  const dayIdx = Math.max(0, daysBetween(PLAN_START, today)); // 0-based
  const weekIdx = Math.min(WEEKS.length - 1, Math.max(0, Math.floor(dayIdx / 7)));
  const week = WEEKS[weekIdx];

  // Map current weekday to the day in the active week's days array
  const dow = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][(today.getDay() + 6) % 7];
  const weekDay = week ? week.days.find(d => d.dow === dow) : null;

  const [tab, setTab] = useState(`Week ${week.n}`);
  const wkKey = isoWeekKey(today);
  const [outreach, setOutreach] = useLocalStorage(`evalve.outreach.${wkKey}`, 0);
  const [completed, setCompleted] = useLocalStorage(`evalve.completed`, []);

  const tabs = ["Week 1", "Week 2", "Week 3", "Week 4", "Templates", "Paths", "Reality check"];
  const activeWeek = (() => {
    if (tab.startsWith("Week ")) {
      const n = parseInt(tab.split(" ")[1], 10);
      return WEEKS.find(w => w.n === n);
    }
    return null;
  })();

  // Switch the active tab automatically to the current week on first load if it has not been set.
  useEffect(() => {
    if (tab === `Week ${week.n}`) return;
  }, []);

  return (
    <div className="max-w-2xl mx-auto px-4 sm:px-6 py-5 sm:py-8 space-y-5">
      <header className="flex items-baseline justify-between">
        <div>
          <p className="font-head text-indigo text-lg leading-none">Evalve</p>
          <p className="text-[10px] uppercase tracking-widest text-slate">First $10K · 30-day plan</p>
        </div>
        <a href="https://evalveconsulting.com" className="text-teal text-xs underline">evalveconsulting.com</a>
      </header>

      <Hero today={today} dayIdx={dayIdx} week={week} weekDay={weekDay} outreach={outreach} setOutreach={setOutreach} />

      <TabStrip tabs={tabs} active={tab} setActive={setTab} />

      {activeWeek && <WeekView week={activeWeek} today={today} completed={completed} setCompleted={setCompleted} />}
      {tab === "Templates" && <TemplatesView />}
      {tab === "Paths" && <PathsView />}
      {tab === "Reality check" && <RealityView />}

      <footer className="pt-4 pb-8 text-center text-xs text-slate/70">
        Open this every morning. Close it after you have sent a message. Chris.
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
