    const getPriorityLabel = (s) => s >= 75 ? "Quick Win" : s >= 50 ? "High Priority" : s >= 30 ? "Medium Priority" : "Low Priority";

    function ProgressBar({ value, max, color, height = 8 }) {
      return (
        <div style={{ width: "100%", background: "rgba(46,43,111,0.08)", borderRadius: height / 2, height, overflow: "hidden" }}>
          <div style={{ width: `${Math.min((value / max) * 100, 100)}%`, height: "100%", background: color || COLORS.softTeal, borderRadius: height / 2, transition: "width 0.6s ease" }} />
        </div>
      );
    }

    function MiniChart({ data, height = 130 }) {
      const max = Math.max(...data.map((d) => d.value), 1);
      const barW = Math.max(Math.min(44, (320 - data.length * 6) / data.length), 18);
      return (
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height, justifyContent: "center", padding: "0 8px" }}>
          {data.map((d, i) => (
            <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.softTeal, fontFamily: FONT_HEADING }}>{d.value.toFixed(1)}</div>
              <div style={{ width: barW, height: Math.max((d.value / max) * (height - 44), 4), background: `linear-gradient(180deg, ${COLORS.softTeal}, ${COLORS.deepIndigo})`, borderRadius: "4px 4px 0 0", transition: "height 0.4s ease" }} title={`${d.label}: ${d.value.toFixed(1)} hrs/week`} />
              <span style={{ fontSize: 9, color: COLORS.slateGray, maxWidth: barW + 10, textAlign: "center", lineHeight: 1.1, wordBreak: "break-word" }}>{d.short}</span>
            </div>
          ))}
        </div>
      );
    }

    function SystemMap({ results }) {
      const areas = results.filter((r) => r.tasks.length > 0);
      if (areas.length === 0) return null;
      const cX = 300, cY = 220, R = 160;
      return (
        <svg viewBox="0 0 600 440" style={{ width: "100%", maxWidth: 600, height: "auto" }}>
          <circle cx={cX} cy={cY} r={44} fill={COLORS.deepIndigo} />
          <text x={cX} y={cY - 6} textAnchor="middle" fill={COLORS.white} fontSize="9" fontWeight="700" fontFamily={FONT_HEADING}>Your</text>
          <text x={cX} y={cY + 8} textAnchor="middle" fill={COLORS.white} fontSize="9" fontWeight="700" fontFamily={FONT_HEADING}>Business</text>
          {areas.map((area, i) => {
            const a = (2 * Math.PI * i) / areas.length - Math.PI / 2;
            const x = cX + R * Math.cos(a), y = cY + R * Math.sin(a);
            const automated = area.tasks.filter((t) => t.automationPotential >= 0.6).length;
            const ratio = area.tasks.length > 0 ? automated / area.tasks.length : 0;
            const clr = ratio >= 0.6 ? COLORS.successGreen : ratio >= 0.3 ? COLORS.warningAmber : COLORS.slateGray;
            const nr = 28 + ratio * 14;
            return (
              <g key={area.id}>
                <line x1={cX} y1={cY} x2={x} y2={y} stroke={clr} strokeWidth={1.5 + ratio * 2} strokeOpacity={0.4} strokeDasharray={ratio < 0.3 ? "4,4" : "none"} />
                <circle cx={x} cy={y} r={nr} fill={clr} opacity={0.12} />
                <circle cx={x} cy={y} r={nr - 4} fill={COLORS.white} stroke={clr} strokeWidth={2} />
                <text x={x} y={y - 3} textAnchor="middle" fontSize="14">{OPERATIONAL_AREAS.find((o) => o.id === area.id)?.icon}</text>
                <text x={x} y={y + 11} textAnchor="middle" fill={COLORS.deepIndigo} fontSize="7" fontWeight="600" fontFamily={FONT_HEADING}>{area.name.split(" ")[0].substring(0, 8)}</text>
                <text x={x} y={y + nr + 13} textAnchor="middle" fill={clr} fontSize="8" fontWeight="700" fontFamily={FONT_BODY}>{Math.round(ratio * 100)}% automatable</text>
              </g>
            );
          })}
        </svg>
      );
    }

    function WorkflowAudit() {
      const [step, setStep] = useState("intro");
      const [orgName, setOrgName] = useState("");
      const [orgType, setOrgType] = useState("");
      const [industry, setIndustry] = useState("");
      const [teamSize, setTeamSize] = useState("");
      const [selectedAreas, setSelectedAreas] = useState([]);
      const [taskResponses, setTaskResponses] = useState({});
      const [currentAreaIdx, setCurrentAreaIdx] = useState(0);
      const [showAllAreas, setShowAllAreas] = useState(false);
      const scrollRef = useRef(null);

      const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxQHQ44jiLKFtysSrUllqSI6M3yOl0vjl18Es6GG0suvYprab9o7FpAxmsgX4hOPHNE/exec';

      const buildPDF = useCallback((results) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pw = doc.internal.pageSize.getWidth();
        const ph = doc.internal.pageSize.getHeight();
        const m = 20, cw = pw - 2 * m;
        let y = m;
        const dateStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const sz = parseInt(teamSize) || 1;
        function cp(n) { if (y + n > ph - m) { doc.addPage(); y = m; } }
        function hexToRgb(hex) { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); return [r,g,b]; }

        const totH = results.reduce((s, r) => s + r.totalHours, 0);
        const totS = results.reduce((s, r) => s + r.totalSaveable, 0);
        const totA = results.reduce((s, r) => s + r.totalAnnualSavings, 0);
        const allTasks = results.flatMap((r) => r.tasks).sort((a, b) => b.priorityScore - a.priorityScore);
        const top = allTasks.slice(0, 10);

        // Header
        doc.setFillColor(46, 43, 111);
        doc.roundedRect(m, y, cw, 28, 4, 4, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.setTextColor(255, 255, 255);
        doc.text('Evalve Consulting', pw / 2, y + 18, { align: 'center' });
        y += 36;

        // Title
        doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.setTextColor(46, 43, 111);
        doc.text('Invisible Work Audit Report', pw / 2, y, { align: 'center' });
        y += 12;

        // Business info box
        cp(28);
        doc.setFillColor(245, 245, 248);
        doc.roundedRect(m, y, cw, 24, 3, 3, 'F');
        doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(46, 43, 111);
        doc.text('Organization:', m + 5, y + 7); doc.text('Industry:', m + 5, y + 14); doc.text('Team Size:', m + 5, y + 21);
        doc.setFont('helvetica', 'normal'); doc.setTextColor(92, 95, 102);
        doc.text(orgName || 'Not provided', m + 35, y + 7); doc.text(industry || 'Not provided', m + 30, y + 14); doc.text(sz + ' member' + (sz !== 1 ? 's' : ''), m + 33, y + 21);
        doc.setFont('helvetica', 'bold'); doc.setTextColor(46, 43, 111);
        doc.text('Type:', pw / 2 + 5, y + 7); doc.text('Date:', pw / 2 + 5, y + 14);
        doc.setFont('helvetica', 'normal'); doc.setTextColor(92, 95, 102);
        doc.text(orgType || 'Not provided', pw / 2 + 20, y + 7); doc.text(dateStr, pw / 2 + 20, y + 14);
        y += 30;

        // Summary stats bar
        cp(16);
        doc.setFillColor(63, 167, 163);
        doc.roundedRect(m, y, cw, 16, 3, 3, 'F');
        doc.setFontSize(11); doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold');
        doc.text(totH.toFixed(0) + ' hrs/wk audited  |  ' + totS.toFixed(0) + ' hrs/wk recoverable  |  $' + Math.round(totA).toLocaleString() + '/yr potential savings', pw / 2, y + 10, { align: 'center' });
        y += 22;

        doc.setDrawColor(232, 232, 236); doc.line(m, y, pw - m, y); y += 8;

        // Top priorities
        if (top.length > 0) {
          cp(16);
          doc.setFillColor(46, 43, 111);
          doc.roundedRect(m, y, cw, 12, 3, 3, 'F');
          doc.setFontSize(11); doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold');
          doc.text('Top Automation Priorities', m + 5, y + 8);
          y += 18;

          top.forEach((task, i) => {
            const label = (i + 1) + '. ' + task.label;
            const lines = doc.splitTextToSize(label, cw - 60);
            const bh = lines.length * 5 + 8;
            cp(bh);

            const bgColor = i === 0 ? [232, 248, 247] : [245, 245, 248];
            doc.setFillColor(...bgColor);
            doc.roundedRect(m, y - 2, cw, bh, 2, 2, 'F');

            // Priority badge
            const pColor = hexToRgb(getPriorityColor(task.priorityScore));
            doc.setFillColor(...pColor);
            doc.circle(m + 6, y + 3, 3, 'F');
            doc.setFontSize(7); doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold');
            doc.text(String(i + 1), m + 6, y + 4.5, { align: 'center' });

            doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(46, 43, 111);
            doc.text(lines, m + 12, y + 3);

            // Right side info
            doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(92, 95, 102);
            doc.text(task.hoursReported + ' hrs/wk', pw - m - 40, y + 3);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...pColor);

                        {does && (
                          <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
                            <div><label style={{ ...lbl, fontSize: 11 }}>Hours / week</label><input type="number" step="0.5" min="0" value={r.hours ?? task.avgHoursWeek} onChange={(e) => setTaskTime(task.id, e.target.value)} style={{ ...inp, width: 80, padding: "8px 10px", fontSize: 14 }} /></div>
                            <div><label style={{ ...lbl, fontSize: 11 }}>Pain level</label><div style={{ display: "flex", gap: 4 }}>{["low", "medium", "high"].map((lv) => { const active = (r.pain || "medium") === lv; const c = lv === "high" ? COLORS.dangerRed : lv === "medium" ? COLORS.warningAmber : COLORS.successGreen; return (<button key={lv} onClick={() => setTaskPain(task.id, lv)} style={{ padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT_BODY, border: `1.5px solid ${active ? c : "rgba(46,43,111,0.12)"}`, background: active ? `${c}12` : "transparent", color: active ? c : COLORS.slateGray }}>{lv === "low" ? "Low" : lv === "medium" ? "Med" : "High"}</button>); })}</div></div>
                            <div style={{ fontSize: 11, color: COLORS.slateGray, alignSelf: "center" }}>{task.category === "ai" ? "\uD83E\uDD16 AI candidate" : "\u2699\uFE0F Automation candidate"}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ); })}
              </div>
              <div style={{ display: "flex", gap: 12, justifyContent: "space-between", marginTop: 24 }}>
                <button onClick={() => { if (currentAreaIdx > 0) setCurrentAreaIdx(currentAreaIdx - 1); else setStep("select_areas"); }} style={btnS}>Back</button>
                <button onClick={() => { if (currentAreaIdx < selectedAreas.length - 1) setCurrentAreaIdx(currentAreaIdx + 1); else setStep("results"); }} style={btnP}>{currentAreaIdx < selectedAreas.length - 1 ? "Next Area \u2192" : "See Results"}</button>
              </div>
            </div>
          </div>
        );
      }

      if (step === "results") {
        const results = computeResults();
        const totH = results.reduce((s, r) => s + r.totalHours, 0);
        const totS = results.reduce((s, r) => s + r.totalSaveable, 0);
        const totA = results.reduce((s, r) => s + r.totalAnnualSavings, 0);
        const allTasks = results.flatMap((r) => r.tasks).sort((a, b) => b.priorityScore - a.priorityScore);
        const top = allTasks.slice(0, 10);
        const sz = parseInt(teamSize) || 1;

        return (
          <div style={{ minHeight: "100vh", background: COLORS.lightBg, fontFamily: FONT_BODY }}>
            <div ref={scrollRef} />
            <div style={{ background: `linear-gradient(145deg, ${COLORS.deepIndigo} 0%, ${COLORS.indigoDark} 100%)`, padding: "40px 24px 48px", textAlign: "center" }}>
              <div style={{ maxWidth: 720, margin: "0 auto" }}>
                <div style={{ fontSize: 12, color: COLORS.softTeal, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginBottom: 12, fontFamily: FONT_HEADING }}>Your Invisible Work Audit Results</div>
                <h1 style={{ color: COLORS.white, fontSize: 28, fontWeight: 700, fontFamily: FONT_HEADING, margin: "0 0 8px" }}>{orgName || "Your Business"}'s Automation Opportunity</h1>
                <p style={{ color: "rgba(255,255,255,0.55)", fontSize: 14 }}>{industry} — {orgType} — {sz} team member{sz !== 1 ? "s" : ""}</p>
                <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 28, flexWrap: "wrap" }}>
                  {[
                    { v: `${totH.toFixed(0)} hrs`, l: "Hours spent weekly on audited tasks", c: COLORS.white },
                    { v: `${totS.toFixed(0)} hrs`, l: "Hours recoverable through AI and automation", c: COLORS.softTeal },
                    { v: `$${Math.round(totA).toLocaleString()}`, l: "Estimated annual value of recovered time", c: "#7DDFCF" },
                  ].map((s, i) => (
                    <div key={i} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 10, padding: "20px 24px", flex: "1 1 180px", maxWidth: 220, border: "1px solid rgba(255,255,255,0.06)" }}>
                      <div style={{ fontSize: 30, fontWeight: 700, color: s.c, fontFamily: FONT_HEADING }}>{s.v}</div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.55)", lineHeight: 1.4, marginTop: 4 }}>{s.l}</div>
                    </div>
                  ))}
                </div>
                <p style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 16 }}>Based on ${HOURLY_RATE}/hr loaded cost &times; {WEEKS_PER_YEAR} working weeks &times; {sz} team member{sz !== 1 ? "s" : ""}. Sources: McKinsey Global Institute, Smartsheet, Formstack.</p>
              </div>
            </div>

            <div style={{ maxWidth: 720, margin: "-24px auto 0", padding: "0 24px 48px" }}>
              <div style={{ ...card, marginBottom: 20 }}>
                <h2 style={{ fontFamily: FONT_HEADING, color: COLORS.deepIndigo, fontSize: 20, margin: "0 0 4px" }}>Your Top Automation Priorities</h2>
                <p style={{ color: COLORS.slateGray, fontSize: 13, margin: "0 0 20px" }}>Ranked by automation feasibility, time consumed, and how painful the task is for your team.</p>
                {top.length === 0 ? <p style={{ color: COLORS.slateGray, fontStyle: "italic" }}>No tasks were checked off. Go back and mark the tasks your team actually does.</p> : (
                  <div style={{ display: "grid", gap: 10 }}>
                    {top.map((task, i) => (
                      <div key={task.id} style={{ display: "flex", gap: 12, alignItems: "center", padding: "12px 16px", background: i === 0 ? COLORS.tealLight : COLORS.indigoLight, borderRadius: 10, border: i === 0 ? `1px solid ${COLORS.tealBorder}` : "1px solid transparent" }}>
                        <div style={{ width: 28, height: 28, borderRadius: "50%", background: getPriorityColor(task.priorityScore), display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.white, fontSize: 12, fontWeight: 700, flexShrink: 0, fontFamily: FONT_HEADING }}>{i + 1}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 600, color: COLORS.deepIndigo, fontSize: 13, lineHeight: 1.3 }}>{task.label}</div>
                          <div style={{ display: "flex", gap: 12, marginTop: 4, flexWrap: "wrap" }}>
                            <span style={{ fontSize: 11, color: COLORS.slateGray }}>{task.hoursReported} hrs/wk</span>
                            <span style={{ fontSize: 11, color: getPriorityColor(task.priorityScore), fontWeight: 600 }}>{getPriorityLabel(task.priorityScore)}</span>
                            <span style={{ fontSize: 11, color: COLORS.slateGray }}>{task.category === "ai" ? "\uD83E\uDD16 AI" : "\u2699\uFE0F Automation"}</span>
                          </div>
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}><div style={{ fontSize: 14, fontWeight: 700, color: COLORS.deepIndigo, fontFamily: FONT_HEADING }}>~{task.saveableHours.toFixed(1)} hrs</div><div style={{ fontSize: 10, color: COLORS.slateGray }}>recoverable/wk</div></div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div style={{ ...card, marginBottom: 20 }}>
                <h2 style={{ fontFamily: FONT_HEADING, color: COLORS.deepIndigo, fontSize: 20, margin: "0 0 4px" }}>Breakdown by Area</h2>
                <p style={{ color: COLORS.slateGray, fontSize: 13, margin: "0 0 16px" }}>How each part of your operation stacks up.</p>
                {(() => { const cd = results.filter((r) => r.tasks.length > 0); return cd.length > 0 ? (<><MiniChart data={cd.map((r) => ({ label: r.name, short: r.name.split("&")[0].trim().split(" ").slice(0, 2).join(" "), value: r.totalSaveable }))} /><p style={{ textAlign: "center", fontSize: 11, color: COLORS.slateGray, marginTop: 8 }}>Recoverable hours per week by area</p></>) : null; })()}
                <div style={{ marginTop: 20, display: "grid", gap: 10 }}>
                  {results.filter((r) => r.tasks.length > 0).sort((a, b) => b.totalAnnualSavings - a.totalAnnualSavings).map((area) => (
                    <div key={area.id} style={{ padding: "14px 16px", background: COLORS.indigoLight, borderRadius: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}><div style={{ fontWeight: 700, color: COLORS.deepIndigo, fontSize: 14, fontFamily: FONT_HEADING }}>{area.icon} {area.name}</div><div style={{ fontSize: 14, fontWeight: 700, color: COLORS.softTeal, fontFamily: FONT_HEADING }}>${Math.round(area.totalAnnualSavings).toLocaleString()}/yr</div></div>
                      <ProgressBar value={area.totalSaveable} max={area.totalHours || 1} color={COLORS.softTeal} height={6} />
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 11, color: COLORS.slateGray }}><span>{area.totalHours.toFixed(1)} hrs/wk total</span><span>{area.totalSaveable.toFixed(1)} hrs/wk recoverable ({area.totalHours > 0 ? Math.round((area.totalSaveable / area.totalHours) * 100) : 0}%)</span></div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ ...card, marginBottom: 20 }}>
                <h2 style={{ fontFamily: FONT_HEADING, color: COLORS.deepIndigo, fontSize: 20, margin: "0 0 4px" }}>Your Operations Map</h2>
                <p style={{ color: COLORS.slateGray, fontSize: 13, margin: "0 0 16px" }}>Solid lines show high automation potential. Dashed lines show areas needing more human judgment.</p>
                <div style={{ display: "flex", justifyContent: "center" }}><SystemMap results={results} /></div>
                <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 12, flexWrap: "wrap" }}>
                  {[{ color: COLORS.successGreen, label: "60%+ automatable" }, { color: COLORS.warningAmber, label: "30-60% automatable" }, { color: COLORS.slateGray, label: "Under 30%" }].map((l) => (
                    <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: COLORS.slateGray }}><div style={{ width: 10, height: 10, borderRadius: "50%", background: l.color }} />{l.label}</div>
                  ))}
                </div>
              </div>

              <div style={{ ...card, marginBottom: 20, display: "flex", gap: 20, flexWrap: "wrap" }}>
                <div style={{ flex: "1 1 240px" }}><h3 style={{ fontFamily: FONT_HEADING, color: COLORS.deepIndigo, fontSize: 16, margin: "0 0 8px" }}>{"\u2699\uFE0F"} Automation Candidates</h3><p style={{ color: COLORS.slateGray, fontSize: 13, lineHeight: 1.5, margin: 0 }}>Rule-based, repetitive tasks. "If this happens, do that." Sending reminders, moving data between systems, creating invoices, updating statuses. These can be automated with workflow tools today.</p></div>
                <div style={{ flex: "1 1 240px" }}><h3 style={{ fontFamily: FONT_HEADING, color: COLORS.deepIndigo, fontSize: 16, margin: "0 0 8px" }}>{"\uD83E\uDD16"} AI Candidates</h3><p style={{ color: COLORS.slateGray, fontSize: 13, lineHeight: 1.5, margin: 0 }}>Tasks needing judgment, language, or pattern recognition. Drafting emails, analyzing data, creating content, summarizing feedback. AI handles the heavy lifting while your team adds the final judgment.</p></div>
              </div>

              <div style={{ ...card, background: COLORS.deepIndigo, border: "none", textAlign: "center", padding: "36px 32px" }}>
                <h2 style={{ fontFamily: FONT_HEADING, color: COLORS.white, fontSize: 22, margin: "0 0 12px" }}>Ready to Act on These Results?</h2>
                <p style={{ color: "rgba(255,255,255,0.7)", fontSize: 15, lineHeight: 1.6, margin: "0 0 24px" }}>I help organizations turn audits like this into working AI solutions and automations. Not strategy decks. Working tools that save your team real hours every week.</p>
                <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                  <a href="https://calendar.app.google/HjzF8PMaQbrM2GGF8" target="_blank" rel="noopener noreferrer" style={{ ...btnP, textDecoration: "none", display: "inline-block" }}>Book a Free Discovery Call</a>
                  <a href="https://evalveconsulting.com/ai-readiness/" target="_blank" rel="noopener noreferrer" style={{ ...btnS, textDecoration: "none", display: "inline-block", color: "rgba(255,255,255,0.7)", borderColor: "rgba(255,255,255,0.25)" }}>Take the AI Readiness Assessment</a>
                </div>
                <p style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginTop: 16 }}>Dr. Chris Sanzeri, Evalve Consulting<br />christophersanzeri@evalveconsulting.com</p>
              </div>

              <div style={{ marginTop: 24, padding: "16px 20px", background: COLORS.tealLight, borderRadius: 10, border: `1px solid ${COLORS.tealBorder}` }}>
                <h3 style={{ fontFamily: FONT_HEADING, color: COLORS.deepIndigo, fontSize: 14, margin: "0 0 8px" }}>About This Audit's Methodology</h3>
                <p style={{ color: COLORS.slateGray, fontSize: 12, lineHeight: 1.6, margin: 0 }}>Automation potential percentages are calibrated using McKinsey Global Institute's task-level analysis, which assessed 2,000+ work activities across 800+ occupations. Time savings use a ${HOURLY_RATE}/hr loaded cost as a conservative baseline. Priority scoring blends three factors: technical feasibility, time consumed, and pain level. Actual savings depend on your specific systems, processes, and implementation approach. This audit provides directional estimates to help you prioritize, not exact financial projections.</p>
              </div>

              <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 24 }}>
                <button onClick={() => downloadPDF(results)} style={{ ...btnP, background: COLORS.deepIndigo }}>Download Full Report</button>
                <button onClick={() => { setStep("intro"); setTaskResponses({}); setSelectedAreas([]); setCurrentAreaIdx(0); setOrgName(""); setOrgType(""); setIndustry(""); setTeamSize(""); }} style={btnS}>Start Over</button>
              </div>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<WorkflowAudit />);
  </script>
</body>
</html>
